name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  checks:
    name: Checks & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ---- Build (dependency order) ----
      - name: Build core
        run: npm run build --workspace=packages/core

      - name: Build emitters
        run: npm run build --workspace=packages/emitters

      - name: Build optimizer
        run: npm run build --workspace=packages/optimizer

      - name: Build evaluator
        run: npm run build --workspace=packages/evaluator

      - name: Build CLI
        run: npm run build --workspace=packages/cli

      # ---- Tests ----
      - name: Test core
        run: npm test --workspace=packages/core

      - name: Test emitters
        run: npm test --workspace=packages/emitters

      - name: Test optimizer
        run: npm test --workspace=packages/optimizer

      - name: Test evaluator
        run: npm test --workspace=packages/evaluator

      - name: Test CLI
        run: npm test --workspace=packages/cli

      # ---- Cross-cutting checks ----
      - name: Changeset version dry-run
        timeout-minutes: 2
        run: npx changeset version 2>&1 && git checkout -- .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
