name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Version or Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build --workspace=packages/core

      - name: Build emitters
        run: npm run build --workspace=packages/emitters

      - name: Build optimizer
        run: npm run build --workspace=packages/optimizer

      - name: Build CLI
        run: npm run build --workspace=packages/cli

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run changeset:version
          publish: npx changeset publish
          title: 'chore: version packages'
          commit: 'chore: version packages'
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build VSIX
        if: steps.changesets.outputs.published == 'true'
        run: |
          npm run build --workspace=extension
          cd extension && npx @vscode/vsce package --no-dependencies

      - name: Create GitHub Release with VSIX
        if: steps.changesets.outputs.published == 'true'
        run: |
          CLI_VERSION=$(echo '${{ steps.changesets.outputs.publishedPackages }}' | jq -r '.[] | select(.name == "aspectcode") | .version')
          if [ -n "$CLI_VERSION" ]; then
            TAG="aspectcode@${CLI_VERSION}"
            # Create the release (only for the CLI package)
            gh release create "$TAG" \
              --title "aspectcode v${CLI_VERSION}" \
              --generate-notes \
              --target "${{ github.sha }}" \
              extension/*.vsix
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
