name: Nightly CLI Multi-Repo

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      repoFilter:
        description: Optional repo name filter (e.g. flask)
        required: false
        type: string

permissions:
  contents: read

jobs:
  multi-repo-cli:
    name: Multi-repo CLI matrix (Windows)
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build core/emitters/optimizer/evaluator/cli
        run: npm run build --workspace=packages/core --workspace=packages/emitters --workspace=packages/optimizer --workspace=packages/evaluator --workspace=packages/cli

      - name: Run multi-repo CLI tests
        shell: pwsh
        run: |
          if ('${{ github.event.inputs.repoFilter }}' -ne '') {
            powershell -ExecutionPolicy Bypass -File ./scripts/test-cli-repos.ps1 -SkipBuild -RepoFilter '${{ github.event.inputs.repoFilter }}'
          } else {
            npm run test:cli:repos:fast
          }
