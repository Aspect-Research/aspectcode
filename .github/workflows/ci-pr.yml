name: CI PR

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cli-sandbox-smoke:
    name: CLI sandbox smoke (Windows)
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build core/emitters/cli
        run: npm run build --workspace=packages/core --workspace=packages/emitters --workspace=packages/cli

      - name: Run sandbox CLI smoke tests
        shell: pwsh
        run: npm run test:cli:fast
